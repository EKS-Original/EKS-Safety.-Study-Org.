        .qa-item:hover {

        .question {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.15rem;
        }

        .question-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .category-tag {
            background-color: rgba(251, 191, 36, 0.1);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        .toggle-icon {
            color: var(--accent-gold);
            font-size: 1.5rem;

        }

        .qa-item.active .toggle-icon {

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
        }
        
        .no-result {
            text-align: center;

            color: var(--text-muted);

        }

        @media (max-width: 600px) {
            .filter-section {
                flex-direction: column;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>

    <script>

            // --- CHAPTER 1: GENERAL SAFETY ---

            { category: "1. General Safety", q: "Live Line (မီးရှင်) တွင် အလုပ်လုပ်ရန် လိုအပ်လာပါက မည်သို့ဆောင်ရွက်ရမည်နည်း?", a: "Live Line အလုပ်များကို ရှောင်ရှားသင့်သော်လည်း မဖြစ်မနေလုပ်ရပါက Qualified Person (ကျွမ်းကျင်သူ) သာ လုပ်ဆောင်ရမည်။ သင့်လျော်သော Class ရှိသည့် Insulated Gloves၊ Arc Flash Suit၊ Insulated Tools နှင့် Rubber Mat တို့ကို မဖြစ်မနေ အသုံးပြုရပါမည်။" },
            { category: "1. General Safety", q: "စိုစွတ်သော နေရာများ (Wet Locations) တွင် အလုပ်လုပ်ရာတွင် သတိပြုရမည့် အချက်များ", a: "စိုစွတ်သောနေရာများတွင် လျှပ်စစ်ခုခံမှု (Resistance) ကျဆင်းသဖြင့် အန္တရာယ်ပိုများသည်။ GFCI (Ground Fault Circuit Interrupter) သို့မဟုတ် RCBO တပ်ဆင်ထားသော ပလပ်များကိုသာ သုံးရမည်။ လက်နှင့် ဖိနပ်များ ခြောက်သွေ့နေရန် အလွန်အရေးကြီးသည်။" },

            // --- CHAPTER 2: LOCKOUT / TAGOUT (LOTO) ---
            { category: "2. LOTO Procedure", q: "LOTO (Lockout/Tagout) ဆိုတာ ဘာလဲ? ဘာကြောင့် လုပ်ရတာလဲ?", a: "LOTO ဆိုသည်မှာ ပြုပြင်ထိန်းသိမ်းမှု လုပ်နေစဉ်အတွင်း တစ်စုံတစ်ယောက်မှ မတော်တဆ ခလုတ်ပြန်ဖွင့်မိခြင်း (Accidental Energization) ကြောင့် အသက်အန္တရာယ် မဖြစ်စေရန် Breaker/Switch များတွင် သော့ခတ်ခြင်း (Lockout) နှင့် သတိပေးစာတန်းချိတ်ဆွဲခြင်း (Tagout) လုပ်ငန်းစဉ်ဖြစ်သည်။" },
            { category: "2. LOTO Procedure", q: "LOTO သော့ကို မည်သူက ပြန်ဖွင့်ခွင့် (Remove) ရှိသနည်း?", a: "LOTO သော့ကို ခတ်ခဲ့သော သူ (Authorized Person) သာလျှင် ပြန်ဖွင့်ခွင့်ရှိသည်။ အခြားမည်သူမျှ လာရောက်ဖွင့်ခွင့်၊ ဖျက်ဆီးခွင့် မရှိပါ။" },

            // --- CHAPTER 3: PPE (Personal Protective Equipment) ---
            { category: "3. PPE & Tools", q: "Electrical Hazard အတွက် အသုံးပြုရမည့် ဖိနပ် (Safety Shoes) အမျိုးအစား", a: "သံချွန်၊ သံပြားပါသော (Steel-toe) ဖိနပ်များကို မသုံးရပါ။ လျှပ်စစ်မလိုက်နိုင်သော (Non-conductive)၊ EH (Electrical Hazard) Rating ပါဝင်သော ဖိနပ်များကိုသာ ဝတ်ဆင်ရပါမည်။" },
            { category: "3. PPE & Tools", q: "Insulated Tools (လျှပ်ကာတပ် ကိရိယာများ) ကို အသုံးမပြုမီ ဘာတွေစစ်ဆေးရမလဲ?", a: "Pliers၊ Screwdriver ကဲ့သို့သော Insulated Tool များ၏ အစွပ်များ (Insulation) ပေါက်ပြဲနေခြင်း၊ ကွဲအက်နေခြင်း ရှိမရှိ အသုံးမပြုမီ မျက်စိဖြင့် အမြဲစစ်ဆေး (Visual Inspection) ရမည်။ အနည်းငယ် ပေါက်ပြဲနေပါက အသုံးမပြုရပါ။" },

            // --- CHAPTER 4: EARTHING & BONDING ---
            { category: "4. Earthing System", q: "Earthing (Grounding) ၏ အဓိက ရည်ရွယ်ချက် (၂) ခု", a: "၁။ စက်ပစ္စည်း ကိုယ်ထည် (Body) သို့ မီးရှော့ဖြစ်ပါက (Fault Current) လူကို ဓာတ်မလိုက်စေဘဲ မြေကြီးထဲသို့ အမြန်ဆုံး စီးဆင်းသွားစေရန်။ <br>၂။ Circuit Breaker (MCB/MCCB) များကို လျင်မြန်စွာ Trip ဖြစ်စေရန် လုံလောက်သော Fault Current ပတ်လမ်း ဖန်တီးပေးရန်။" },
            { category: "4. Earthing System", q: "Equipotential Bonding ဆိုတာဘာလဲ?", a: "အဆောက်အဦအတွင်းရှိ လျှပ်စစ်စီးကူးနိုင်သော သတ္တုပစ္စည်းများ (ရေပိုက်၊ ဓာတ်ငွေ့ပိုက်၊ သံဘောင်များ) အားလုံးကို ဝါယာကြိုးဖြင့် ချိတ်ဆက်ပြီး Earth Bar သို့ သွယ်တန်းခြင်းဖြစ်သည်။ ၎င်းသည် သတ္တုအစိတ်အပိုင်းများကြား Voltage difference မဖြစ်ပေါ်စေရန် ကာကွယ်ပေးသည်။" },

            // --- CHAPTER 5: FAULT & TROUBLESHOOTING SAFETY ---
            { category: "5. Troubleshooting", q: "Multimeter ဖြင့် Voltage တိုင်းရာတွင် သတိပြုရမည့် အချက်များ", a: "Multimeter ၏ Range ကို မှန်ကန်စွာ ရွေးချယ်ပါ။ (ဥပမာ - AC Voltage တိုင်းမည်ဆိုပါက AC V ကိုသာထားပါ)။ Lead ကြိုးများ ပေါက်ပြဲမှုရှိမရှိ စစ်ဆေးပါ။ မတိုင်းမီ မိမိတိုင်းမည့် ပမာဏထက် မြင့်သော Range တွင်ထား၍ စတင်တိုင်းတာပါ။" },
            { category: "5. Troubleshooting", q: "Panel Board ကြီးများရှေ့တွင် အလုပ်လုပ်ပါက မည်သို့ ရပ်သင့်သနည်း?", a: "Arc Flash အန္တရာယ်မှ ကာကွယ်ရန် Panel တံခါးဖွင့်ရာတွင် သို့မဟုတ် Breaker On/Off ပြုလုပ်ရာတွင် Panel ၏ တည့်တည့် (Front) တွင် မရပ်ဘဲ၊ ဘေးဘက် (Side) သို့ အနည်းငယ် ရှောင်၍ လက်တစ်ဖက်တည်းဖြင့်သာ လှမ်း၍ ပြုလုပ်သင့်သည်။" },

            // --- CHAPTER 6: EMERGENCY & FIRST AID ---
            { category: "6. Emergency Response", q: "လူတစ်ဦး ဓာတ်လိုက်နေပါက ပထမဆုံး အရေးပေါ် လုပ်ဆောင်ရမည့်အဆင့်များ", a: "၁။ ဓာတ်လိုက်နေသူကို လက်ဗလာဖြင့် လုံးဝ မကိုင်ပါနှင့်။<br>၂။ Main Breaker / Switch ကို ချက်ချင်း ပိတ်ပါ။<br>၃။ မီးဖြတ်၍ မရပါက သစ်သားခြောက်၊ PVC ပိုက်၊ ရာဘာ ကဲ့သို့ လျှပ်ကာပစ္စည်းဖြင့် တွန်းဖယ်ပါ။<br>၄။ လူကို ဖယ်ရှားပြီးပါက အသက်ရှူ/နှလုံးခုန် စစ်ဆေးပြီး လိုအပ်ပါက CPR ချက်ချင်းလုပ်ပါ။ လူနာတင်ယာဉ်ခေါ်ပါ။" },
            { category: "6. Emergency Response", q: "Electrical Fire (လျှပ်စစ်မီးလောင်မှု) ဖြစ်ပါက မည်သည့် မီးသတ်ဆေးဘူးကို သုံးရမလဲ?", a: "ရေ (Water) ကို လုံးဝ အသုံးမပြုရပါ။ Class C (Electrical Fire) အတွက် ရည်ရွယ်ထားသော CO2 (Carbon Dioxide) သို့မဟုတ် Dry Chemical Powder (DCP) မီးသတ်ဆေးဘူးများကိုသာ အသုံးပြုရပါမည်။" }
            // --- CHAPTER 7: HIGH VOLTAGE (HV) SAFETY ---
            { category: "7. High Voltage Safety", q: "High Voltage (HV) ပိုင်းတွင် အလုပ်လုပ်ရာတွင် လိုက်နာရမည့် အခြေခံစည်းမျဉ်း (PTW)", a: "HV (ဥပမာ - 11kV, 33kV) တွင် အလုပ်လုပ်မည်ဆိုပါက 'Permit to Work' (PTW) စနစ်ကို မဖြစ်မနေ အသုံးပြုရမည်။ Switching လုပ်မည့်သူ၊ မြေချ (Earthing) ပြုလုပ်မည့်သူ နှင့် ကြီးကြပ်သူ (Supervisor) တို့ အဆင့်ဆင့် စစ်ဆေးလက်မှတ်ရေးထိုးပြီးမှသာ အလုပ်စတင်ရမည်။" },
            { category: "7. High Voltage Safety", q: "HV တွင် Discharge လုပ်ခြင်း (Earth ချခြင်း) ဘာကြောင့် အရေးကြီးသနည်း?", a: "HV လိုင်းများနှင့် Cable များသည် Capacitive Effect ကြောင့် မီးဖြတ်ထားသော်လည်း ဓာတ်အား (Residual Charge) ကျန်ရှိနေတတ်သည်။ ထို့ကြောင့် အလုပ်မစမီ Discharge Rod အသုံးပြု၍ ကျန်ရှိနေသော ဓာတ်အားများကို မြေကြီးထဲသို့ မဖြစ်မနေ Discharge (Earth ချ) လုပ်ရမည်။" },

            { category: "8. Arc Flash Protection", q: "Arc Flash ဆိုတာ ဘာလဲ? ဘယ်လို ကာကွယ်မလဲ?", a: "Arc Flash ဆိုသည်မှာ Phase to Phase သို့မဟုတ် Phase to Ground ရှော့ဖြစ်ရာမှ ထွက်ပေါ်လာသော ပြင်းထန်သည့် လျှပ်စစ်မီးတောက်နှင့် ပေါက်ကွဲမှုဖြစ်သည်။ ၎င်းကို ကာကွယ်ရန် လိုအပ်သော ATPV (Arc Thermal Performance Value) Rating ရှိသည့် Arc Flash Suit၊ Face Shield နှင့် သားရေလက်အိတ်များကို ဝတ်ဆင်ရမည်။" },
            { category: "8. Arc Flash Protection", q: "Arc Blast ၏ အန္တရာယ်များ", a: "Arc Flash ကြောင့် ထွက်ပေါ်လာသော အပူချိန်သည် နေ၏ မျက်နှာပြင်ထက် ပိုပူနိုင်ပြီး၊ Arc Blast (ပေါက်ကွဲမှု) ကြောင့် အသံကျယ်လောင်ခြင်း၊ ကြေးနီရည်များ ပန်းထွက်ခြင်းနှင့် အရာဝတ္ထုများ လွင့်စင်လာခြင်းတို့ ဖြစ်နိုင်သဖြင့် သတ်မှတ်ထားသော Arc Flash Boundary ပြင်ပမှသာ နေထိုင်ရမည်။" },

            // --- CHAPTER 9: CABLE & WIRING SAFETY ---
            { category: "9. Cable Safety", q: "Cable ကြိုးများ သွယ်တန်းရာတွင် (Cable Routing) ရှောင်ကြဉ်ရမည့် အချက်များ", a: "Cable ကြိုးများကို ချွန်ထက်သော အနားစွန်းများ၊ အပူချိန်လွန်ကဲသော နေရာများနှင့် ဓာတုပစ္စည်းများ ရှိသောနေရာများတွင် တိုက်ရိုက် မသွယ်တန်းရပါ။ မဖြစ်မနေ သွယ်တန်းရပါက Cable Tray, Conduit သို့မဟုတ် သင့်လျော်သော အကာအကွယ် (Mechanical Protection) အသုံးပြုရမည်။" },
            { category: "9. Cable Safety", q: "Underground Cable (မြေအောက်ကြိုး) တူးဖော်ရာတွင် သတိပြုရန်", a: "မြေမတူးမီ Cable Detector (သို့) မြေအောက်လမ်းကြောင်း မြေပုံကို အသုံးပြု၍ ကြိုးရှိ/မရှိ ကြိုတင်စစ်ဆေးရမည်။ တူးဖော်စဉ်အတွင်း စက်ယန္တရားများ (Excavators) အစား လက်သုံးကိရိယာများကိုသာ သတိထား၍ အသုံးပြုသင့်သည်။" },

            // --- CHAPTER 10: PORTABLE TOOLS & EQUIPMENT ---
            { category: "10. Portable Tools", q: "Power Tools များ အသုံးပြုရာတွင် အန္တရာယ်ကင်းရေး", a: "Power Tools အားလုံး၏ ကြိုးများ၊ ပလပ်များ ကွဲအက်/ပေါက်ပြဲမှု ရှိမရှိ အမြဲစစ်ဆေးပါ။ Double Insulated (Class II) မဟုတ်သော စက်ပစ္စည်းများတွင် Earthing ကြိုး သေချာစွာ ပါဝင်ရမည်။ ရေစိုနေသော လက်ဖြင့် Power Tools များကို လုံးဝ မကိုင်ရပါ။" },
            { category: "10. Portable Tools", q: "Extension Leads (ကြိုးခွေများ) အသုံးပြုခြင်း စည်းမျဉ်း", a: "Cable Reel (ကြိုးခွေ) များကို အသုံးပြုပါက အပူလွန်ကဲ၍ မီးလောင်ကျွမ်းမှု (Overheating & Melting) မဖြစ်စေရန် ကြိုးများကို ခွေထားသည့်အတိုင်း မသုံးဘဲ၊ အကုန်လုံး ဖြန့်ချ (Uncoil) ပြီးမှသာ အသုံးပြုရမည်။" },

            // --- CHAPTER 11: BATTERY SYSTEM SAFETY ---
            { category: "11. Battery Safety", q: "Battery Bank များရှိသော အခန်းတွင် လိုက်နာရမည့် စည်းကမ်းများ", a: "Lead-Acid Battery များမှ ထွက်သော ဟိုက်ဒရိုဂျင် ဓာတ်ငွေ့သည် ပေါက်ကွဲနိုင်သဖြင့် အခန်းတွင်း လေဝင်လေထွက် (Ventilation) ကောင်းမွန်ရမည်။ မီးပွားထွက်စေသော အရာများ၊ ဆေးလိပ်သောက်ခြင်းများကို လုံးဝ တားမြစ်ရမည်။" },
            { category: "11. Battery Safety", q: "Battery များကို ကိုင်တွယ်ရာတွင် သတိပြုရန်", a: "Battery Acid များ လွင့်စဉ်ပါက မျက်စိနှင့် အရေပြားကို ထိခိုက်နိုင်သဖြင့် Chemical Resistant Gloves နှင့် Goggles များကို အသုံးပြုရမည်။ Terminal များကို Metal Tools များဖြင့် မတော်တဆ ရှော့မဖြစ်စေရန် Insulated Tools များကိုသာ သုံးပါ။" },

            // --- CHAPTER 12: SOLAR PV SAFETY ---
            { category: "12. Solar PV Safety", q: "Solar Panel များ တပ်ဆင်ရာတွင် ထူးခြားသော အန္တရာယ်", a: "Solar Panel များသည် နေရောင်ရနေသရွေ့ DC Voltage အမြဲထုတ်ပေးနေမည် ဖြစ်သည်။ မီးဖြတ်ထားသည်ဟု ယူဆ၍ မရပါ။ ထို့ကြောင့် DC Isolator ကို ပိတ်ထားသော်လည်း Panel မှ Isolator အထိ ကြိုးများသည် 'Live' ဖြစ်နေကြောင်း အမြဲသတိပြုရမည်။" }
        ];

        const container = document.getElementById('qa-container');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const resultStats = document.getElementById('resultStats');

        // Dynamically Generate Category Dropdown Options
        function populateCategories() {
            // Get unique categories from the data array
            const uniqueCategories = [...new Set(safetyData.map(item => item.category))];
            
            uniqueCategories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilter.appendChild(option);
            });
        }

        // Render Data Function
        function renderQA(data) {
            container.innerHTML = ''; // Clear current
            
            if (data.length === 0) {
                container.innerHTML = '<div class="no-result">ရှာဖွေမှုရလဒ် မတွေ့ရှိပါ။ တခြားစကားလုံးဖြင့် ထပ်မံရှာဖွေကြည့်ပါ။</div>';
                resultStats.textContent = "0 regulations found.";
                return;
            }

            resultStats.textContent = `Showing ${data.length} regulation${data.length > 1 ? 's' : ''}...`;

            data.forEach((item, index) => {
                const qaDiv = document.createElement('div');
                qaDiv.className = 'qa-item';
                qaDiv.innerHTML = `
                    <div class="question" onclick="toggleAnswer(${index})">
                        <div class="question-content">
                            <span class="category-tag">${item.category}</span>
                            <span>${item.q}</span>
                        </div>
                        <span class="toggle-icon" id="icon-${index}">+</span>
                    </div>
                    <div class="answer" id="answer-${index}">
                        ${item.a}
                    </div>
                `;
                container.appendChild(qaDiv);
            });
        }

        // Accordion Toggle Logic
        window.toggleAnswer = function(index) {
            const items = document.querySelectorAll('.qa-item');
            const currentItem = items[index];
            
            // Close all items (Optional: If you want only one open at a time)
            items.forEach((item, i) => {
                if (i !== index) {
                    item.classList.remove('active');
                    const icon = item.querySelector('.toggle-icon');
                    if (icon) icon.textContent = '+';
                }
            });

            // Toggle the clicked item
            currentItem.classList.toggle('active');
            const icon = currentItem.querySelector('.toggle-icon');
            if (currentItem.classList.contains('active')) {
                icon.textContent = '+'; // CSS handles the rotation to look like an 'X' or '-'
            }
        };

        // Advanced Filter Logic (Handles both Search and Dropdown)
        function applyFilters() {
            const searchQuery = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;

            const filteredData = safetyData.filter(item => {
                // Match Category
                const matchesCategory = selectedCategory === "All" || item.category === selectedCategory;
                
                // Match Search Text (Search in Question, Answer, and Category)
                const matchesSearch = item.q.toLowerCase().includes(searchQuery) || 
                                      item.a.toLowerCase().includes(searchQuery) || 
                                      item.category.toLowerCase().includes(searchQuery);

                return matchesCategory && matchesSearch;
            });

            renderQA(filteredData);
        }

        // Event Listeners for Filters
        searchInput.addEventListener('input', applyFilters);
        categoryFilter.addEventListener('change', applyFilters);

        // Initialize App
        populateCategories();
        renderQA(safetyData);

    </script>
