<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKS - Complete Electrical Safety Regulations</title>
    <style>
        :root {
            --primary-bg: #0b1120;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --accent-gold: #fbbf24;
            --accent-gold-hover: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0;
            color: var(--accent-gold);
            font-size: 2.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.8rem;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Filter Section (Dropdown Only) */
        .filter-section {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .category-select {
            width: 100%;
            max-width: 400px;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--accent-gold);
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fbbf24' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.5rem center;
            background-size: 1.2em;
            transition: all 0.3s ease;
        }

        .category-select:focus, .category-select:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
        }

        .stats {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .qa-item {
            background-color: var(--card-bg);
            margin-bottom: 1.2rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .qa-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-color: var(--card-hover);
        }

        .question {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.15rem;
        }

        .question-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .category-tag {
            background-color: rgba(251, 191, 36, 0.1);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .answer {
            padding: 0 1.5rem;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            background-color: rgba(15, 23, 42, 0.5);
            color: #cbd5e1;
            font-size: 1.05rem;
        }

        .qa-item.active .answer {
            padding: 1.5rem;
            max-height: 2000px;
            opacity: 1;
            border-top: 1px solid var(--border-color);
        }

        .toggle-icon {
            color: var(--accent-gold);
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .qa-item.active .toggle-icon {
            transform: rotate(45deg);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>

            { category: "14. Emergency & First Aid", q: "လူနာကို ကယ်ဆယ်ပြီးပါက လုပ်ဆောင်ရန်", a: "အသက်ရှူ/နှလုံးခုန် စစ်ဆေးပါ။ မရှူတော့ပါက CPR (နှလုံးဖိနှိပ်ခြင်းနှင့် လေမှုတ်သွင်းခြင်း) ကို ချက်ချင်းလုပ်ပါ။ လူနာတင်ယာဉ် ချက်ချင်းခေါ်ပါ။" },
            { category: "14. Emergency & First Aid", q: "Electrical Burns (လျှပ်စစ်ကြောင့် လောင်ကျွမ်းခြင်း)", a: "ဒဏ်ရာကို ရေအေးဖြင့် အနည်းဆုံး ၁၀ မိနစ်ခန့် ဆေးကြောပါ။ ရေခဲ တိုက်ရိုက် မကပ်ရ။ ဆီ၊ သွားတိုက်ဆေး၊ လိမ်းဆေးများကို ဒဏ်ရာပေါ်တွင် လုံးဝ မလိမ်းရ။" }
        ];

        const container = document.getElementById('qa-container');
        const categoryFilter = document.getElementById('categoryFilter');
        const resultStats = document.getElementById('resultStats');

        // Dynamically Generate Category Dropdown Options
        function populateCategories() {
            const uniqueCategories = [...new Set(safetyData.map(item => item.category))];
            
            uniqueCategories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category; // Removed static translation part for clean look
                categoryFilter.appendChild(option);
            });
        }

        // Render Data Function
        function renderQA(data) {
            container.innerHTML = ''; 
            
            if (data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">No data available.</div>';
                resultStats.textContent = "0 regulations found.";
                return;
            }

            resultStats.textContent = `Showing ${data.length} safety regulations...`;

            data.forEach((item, index) => {
                const qaDiv = document.createElement('div');
                qaDiv.className = 'qa-item';
                qaDiv.innerHTML = `
                    <div class="question" onclick="toggleAnswer(${index})">
                        <div class="question-content">
                            <span class="category-tag">${item.category.split('.')[1] || item.category}</span>
                            <span>${item.q}</span>
                        </div>
                        <span class="toggle-icon" id="icon-${index}">+</span>
                    </div>
                    <div class="answer" id="answer-${index}">
                        ${item.a}
                    </div>
                `;
                container.appendChild(qaDiv);
            });
        }

        // Accordion Toggle Logic
        window.toggleAnswer = function(index) {
            const items = document.querySelectorAll('.qa-item');
            const currentItem = items[index];
            
            // Optional: Close others
            items.forEach((item, i) => {
                if (i !== index) {
                    item.classList.remove('active');
                    const icon = item.querySelector('.toggle-icon');
                    if (icon) icon.textContent = '+';
                }
            });

            currentItem.classList.toggle('active');
            const icon = currentItem.querySelector('.toggle-icon');
            if (currentItem.classList.contains('active')) {
                icon.textContent = '−'; 
            } else {
                icon.textContent = '+';
            }
        };

        // Filter Logic (Dropdown Only)
        function applyFilters() {
            const selectedCategory = categoryFilter.value;

            const filteredData = safetyData.filter(item => {
                return selectedCategory === "All" || item.category === selectedCategory;
            });

            renderQA(filteredData);
        }

        // Event Listener for Dropdown
        categoryFilter.addEventListener('change', applyFilters);

        // Initialize App
        populateCategories();
        renderQA(safetyData);

    </script>
</body>
</html>
